name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - name: Install cmocka
        run: |
          sudo apt-get update
          sudo apt-get install libcmocka-dev
      - name: make
        run: make
      - name: make check
        run: make check
